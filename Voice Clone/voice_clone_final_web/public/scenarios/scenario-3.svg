<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <!-- 佔位圖：家門前的那扇門（正式圖請放 public/scenarios/scenario-3.jpg） -->
  <rect width="800" height="450" fill="#0a0910"/>
  <!-- 玄關地板 -->
  <path d="M 0 450 L 240 300 L 560 300 L 800 450 Z" fill="#171226"/>
  <!-- 房門（微光從門縫透出） -->
  <g transform="translate(400 100)">
    <rect x="-90" y="0" width="180" height="260" rx="4" fill="#221a33" stroke="#332a4d" stroke-width="3"/>
    <rect x="86" y="0" width="6" height="260" fill="#ffd98a" opacity="0.55">
      <animate attributeName="opacity" values="0.35;0.6;0.35" dur="3s" repeatCount="indefinite"/>
    </rect>
    <circle cx="66" cy="140" r="9" fill="#8b7a55"/>
  </g>
  <!-- 停在門把上的手（剪影） -->
  <path d="M 470 250 q 34 -12 52 4 q 10 10 -2 18 q -22 12 -46 2 z" fill="#2e2542"/>
  <!-- 陌生的黑色皮鞋 -->
  <g fill="#08070c" stroke="#2a2440" stroke-width="1.5">
    <path d="M 150 392 q 30 -12 52 0 q 16 8 -4 14 q -30 8 -52 -2 q -8 -6 4 -12 z"/>
    <path d="M 216 402 q 30 -12 52 0 q 16 8 -4 14 q -30 8 -52 -2 q -8 -6 4 -12 z"/>
  </g>
  <!-- 散落的衣物 -->
  <g fill="#1e1830">
    <ellipse cx="330" cy="380" rx="42" ry="12"/>
    <ellipse cx="420" cy="356" rx="34" ry="10"/>
    <ellipse cx="490" cy="336" rx="26" ry="8"/>
  </g>
  <!-- 拿在手上的禮物 -->
  <g transform="translate(120 300)">
    <rect x="-26" y="-20" width="52" height="40" rx="4" fill="#3d2c44" stroke="#8b6a94" stroke-width="2"/>
    <line x1="-26" y1="0" x2="26" y2="0" stroke="#8b6a94" stroke-width="2"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#8b6a94" stroke-width="2"/>
  </g>
  <text x="400" y="430" text-anchor="middle" font-size="13" fill="#5a6690" font-family="serif" letter-spacing="4">手，停在門把上</text>
</svg>
